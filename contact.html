<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | NEXUS PC</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
  .contact-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; max-width: 1000px; margin: 0 auto; padding: 48px 24px; }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .form-label .required { color: var(--accent3); margin-left: 4px; font-size: 10px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 10px 14px;
    outline: none; transition: border-color 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 140px; }
  .form-select option { background: var(--bg3); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .form-check { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 24px; }
  .form-check input { margin-top: 3px; accent-color: var(--accent); }
  .form-check label { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .form-check a { color: var(--accent); }

  .btn-submit {
    width: 100%; background: var(--accent); color: #000; border: none;
    font-size: 14px; font-weight: 700; padding: 14px;
    cursor: pointer; transition: background 0.2s;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }
  .btn-submit:hover { background: #33ecff; }

  .contact-info { display: flex; flex-direction: column; gap: 16px; }
  .contact-info-card {
    background: var(--card); border: 1px solid var(--border); padding: 20px;
  }
  .contact-info-card h3 {
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--white); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .contact-info-card p { font-size: 12px; color: var(--text2); line-height: 1.8; }
  .contact-info-card strong { color: var(--text); font-size: 16px; }

  .success-msg {
    display: none; background: rgba(0,229,255,0.1); border: 1px solid var(--accent);
    padding: 20px; text-align: center; margin-top: 16px;
  }
  .success-msg p { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div id="header-mount"></div>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="breadcrumb"><a href="index.html">HOME</a><span>›</span>お問い合わせ</div>
    <div class="page-title">お問い合わせ</div>
  </div>
</div>

<div class="contact-layout">
  <!-- フォーム -->
  <div>
    <div class="section-block" style="margin-bottom:0">
      <h2 style="margin-bottom:24px">お問い合わせフォーム</h2>
    </div>

    <div class="form-group">
      <label class="form-label">お問い合わせ種別<span class="required">必須</span></label>
      <select class="form-select">
        <option value="">選択してください</option>
        <option>商品・スペックについて</option>
        <option>注文・カスタマイズについて</option>
        <option>配送・お届けについて</option>
        <option>お支払いについて</option>
        <option>返品・交換・保証について</option>
        <option>その他</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">お名前（姓）<span class="required">必須</span></label>
        <input type="text" class="form-input" placeholder="山田">
      </div>
      <div class="form-group">
        <label class="form-label">お名前（名）<span class="required">必須</span></label>
        <input type="text" class="form-input" placeholder="太郎">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">メールアドレス<span class="required">必須</span></label>
      <input type="email" class="form-input" placeholder="example@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">電話番号</label>
      <input type="tel" class="form-input" placeholder="000-0000-0000">
    </div>

    <div class="form-group">
      <label class="form-label">注文番号（お持ちの場合）</label>
      <input type="text" class="form-input" placeholder="NEXUS-XXXXXXXX">
    </div>

    <div class="form-group">
      <label class="form-label">お問い合わせ内容<span class="required">必須</span></label>
      <textarea class="form-textarea" placeholder="お問い合わせ内容を詳しくご記入ください..."></textarea>
    </div>

    <div class="form-check">
      <input type="checkbox" id="privacy-agree">
      <label for="privacy-agree">
        <a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意の上、送信します。
      </label>
    </div>

    <button class="btn-submit" onclick="submitForm()">送信する</button>

    <div class="success-msg" id="success-msg">
      <p>✓ お問い合わせを受け付けました</p>
      <p style="font-size:12px; color:var(--text2); font-weight:400; margin-top:8px;">2営業日以内にご返信いたします。</p>
    </div>
  </div>

  <!-- サイドバー -->
  <div class="contact-info">
    <div class="contact-info-card">
      <h3>📞 電話でのお問い合わせ</h3>
      <p><strong>00-0000-0000</strong></p>
      <p>平日 10:00〜18:00<br>（土日祝・年末年始を除く）</p>
    </div>
    <div class="contact-info-card">
      <h3>📧 メールでのお問い合わせ</h3>
      <p>info@example.com<br><br>返信まで2営業日程度いただく場合があります。</p>
    </div>
    <div class="contact-info-card">
      <h3>❓ よくある質問</h3>
      <p>よくあるご質問は<a href="faq.html" style="color:var(--accent)">FAQページ</a>にまとめております。まずはこちらをご確認ください。</p>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = renderHeader('contact');
  document.getElementById('footer-mount').innerHTML = renderFooter();

  function submitForm() {
    const agree = document.getElementById('privacy-agree').checked;
    if (!agree) { alert('プライバシーポリシーに同意してください。'); return; }
    // ★ ここにStripeや実際の送信処理を追加
    document.getElementById('success-msg').style.display = 'block';
  }
</script>
</body>
</html>
